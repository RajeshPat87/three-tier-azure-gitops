apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: three-tier-dev
patches:
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: backend
    spec:
      replicas: 1
  target:
    kind: Deployment
    name: backend
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: frontend
    spec:
      replicas: 1
  target:
    kind: Deployment
    name: frontend
resources:
- ../../base
images:
- name: ACRNAME.azurecr.io/backend
  newName: acrthreetierdev.azurecr.io/backend
  newTag: "262"
- name: ACRNAME.azurecr.io/frontend
  newName: acrthreetierdev.azurecr.io/frontend
  newTag: "262"
