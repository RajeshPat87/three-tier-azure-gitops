# This is a template — in production, secrets are injected via Azure Key Vault CSI Driver
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: three-tier-app
type: Opaque
stringData:
  DB_HOST: "REPLACE_WITH_AZURE_PG_HOST"
  DB_USER: "REPLACE_WITH_DB_USER"
  DB_PASSWORD: "REPLACE_WITH_DB_PASSWORD"
