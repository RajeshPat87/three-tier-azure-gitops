# Template: Azure DevOps repo credentials for ArgoCD
# The actual PAT token is injected by the argocd-setup pipeline at runtime.
apiVersion: v1
kind: Secret
metadata:
  name: ado-repo-creds
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  type: git
  url: https://dev.azure.com/RajeshPatibandla1987/three-tier-azure-gitops/_git/three-tier-gitops-app
  username: "ado"
  password: "${ADO_PAT}"
