# ---------------------------------------------------------------------------
# App Deployment Pipeline (GitOps) – Build → Push to ACR → Update manifests
# ArgoCD detects the manifest change and syncs to AKS automatically.
# ---------------------------------------------------------------------------
trigger:
  branches:
    include:
      - main
  paths:
    include:
      - frontend/**
      - backend/**

parameters:
  - name: environment
    displayName: "Target Environment"
    type: string
    default: dev
    values:
      - dev
      - staging
      - prod
  - name: imageTag
    displayName: "Image Tag (leave empty for BuildId)"
    type: string
    default: ""

variables:
  - name: ACR_NAME
    value: "acrthreetier${{ parameters.environment }}"
  - name: ACR_LOGIN_SERVER
    value: "$(ACR_NAME).azurecr.io"
  - name: AKS_CLUSTER_NAME
    value: "aks-threetier-${{ parameters.environment }}"
  - name: RESOURCE_GROUP
    value: "rg-threetier-${{ parameters.environment }}"
  - name: IMAGE_TAG
    ${{ if eq(parameters.imageTag, '') }}:
      value: "$(Build.BuildId)"
    ${{ else }}:
      value: "${{ parameters.imageTag }}"
  - name: KUSTOMIZE_OVERLAY
    value: "k8s/overlays/${{ parameters.environment }}"

pool:
  vmImage: "ubuntu-latest"

stages:
  # ── Stage 1: Build & Push Backend to ACR ────────────────────────────────
  - stage: BuildBackend
    displayName: "Build & Push Backend to ACR"
    jobs:
      - job: BuildBackendJob
        displayName: "Backend: build → scan → push"
        steps:
          - task: AzureCLI@2
            displayName: "Build, scan & push backend"
            inputs:
              azureSubscription: "azure-service-connection"
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                az acr login --name $(ACR_NAME)

                FULL_TAG="$(ACR_LOGIN_SERVER)/backend:$(IMAGE_TAG)"

                docker build -t "${FULL_TAG}" ./backend

                # Trivy scan – fail on HIGH/CRITICAL
                for i in 1 2 3; do
                  curl -fsSL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.50.0 && break
                  echo "Retry $i..." && sleep 5
                done
                trivy image --exit-code 1 --severity HIGH,CRITICAL --no-progress "${FULL_TAG}"

                docker push "${FULL_TAG}"

                docker tag "${FULL_TAG}" "$(ACR_LOGIN_SERVER)/backend:latest"
                docker push "$(ACR_LOGIN_SERVER)/backend:latest"

                echo "##vso[task.setvariable variable=BACKEND_IMAGE;isOutput=true]${FULL_TAG}"
            name: backendBuild

  # ── Stage 2: Build & Push Frontend to ACR (after backend) ──────────────
  - stage: BuildFrontend
    displayName: "Build & Push Frontend to ACR"
    dependsOn: BuildBackend
    jobs:
      - job: BuildFrontendJob
        displayName: "Frontend: build → scan → push"
        steps:
          - task: AzureCLI@2
            displayName: "Build, scan & push frontend"
            inputs:
              azureSubscription: "azure-service-connection"
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                az acr login --name $(ACR_NAME)

                FULL_TAG="$(ACR_LOGIN_SERVER)/frontend:$(IMAGE_TAG)"

                docker build -t "${FULL_TAG}" ./frontend

                for i in 1 2 3; do
                  curl -fsSL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.50.0 && break
                  echo "Retry $i..." && sleep 5
                done
                trivy image --exit-code 1 --severity HIGH,CRITICAL --no-progress "${FULL_TAG}"

                docker push "${FULL_TAG}"

                docker tag "${FULL_TAG}" "$(ACR_LOGIN_SERVER)/frontend:latest"
                docker push "$(ACR_LOGIN_SERVER)/frontend:latest"

                echo "##vso[task.setvariable variable=FRONTEND_IMAGE;isOutput=true]${FULL_TAG}"
            name: frontendBuild

  # ── Stage 3: Update K8s Manifests (GitOps – commit image tags) ────────
  # ArgoCD watches the repo; when it sees updated image tags, it syncs.
  - stage: UpdateManifests
    displayName: "Update Manifests (GitOps)"
    dependsOn: BuildFrontend
    jobs:
      - deployment: CommitImageTags
        displayName: "Commit image tags → ArgoCD syncs"
        environment: "${{ parameters.environment }}-app"
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                  persistCredentials: true

                - task: Bash@3
                  displayName: "Update kustomization with new image tags"
                  inputs:
                    targetType: inline
                    script: |
                      set -euo pipefail

                      # Install kustomize
                      curl -fsSL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
                      sudo mv kustomize /usr/local/bin/

                      cd $(KUSTOMIZE_OVERLAY)

                      # Update image references in kustomization.yaml
                      kustomize edit set image \
                        "ACRNAME.azurecr.io/backend=$(ACR_LOGIN_SERVER)/backend:$(IMAGE_TAG)" \
                        "ACRNAME.azurecr.io/frontend=$(ACR_LOGIN_SERVER)/frontend:$(IMAGE_TAG)"

                      echo "Updated kustomization.yaml:"
                      cat kustomization.yaml

                - task: Bash@3
                  displayName: "Commit & push updated manifests"
                  inputs:
                    targetType: inline
                    script: |
                      set -euo pipefail

                      git config user.email "ado-pipeline@dev.azure.com"
                      git config user.name "Azure DevOps Pipeline"

                      git add k8s/

                      # Only commit if there are changes
                      if git diff --cached --quiet; then
                        echo "No manifest changes to commit."
                      else
                        git commit -m "chore(gitops): update ${{ parameters.environment }} images to tag $(IMAGE_TAG) [skip ci]

                      Pipeline: $(Build.DefinitionName)
                      Build: $(Build.BuildNumber)
                      Environment: ${{ parameters.environment }}"

                        git push origin HEAD:main
                        echo "Manifests committed. ArgoCD will auto-sync shortly."
                      fi

  # ── Stage 4: Verify ArgoCD Sync ──────────────────────────────────────
  - stage: VerifySync
    displayName: "Verify ArgoCD Sync (${{ parameters.environment }})"
    dependsOn: UpdateManifests
    jobs:
      - job: WaitForSync
        displayName: "Wait for ArgoCD sync"
        steps:
          - task: AzureCLI@2
            displayName: "Monitor ArgoCD sync status"
            inputs:
              azureSubscription: "azure-service-connection"
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                az aks get-credentials \
                  --resource-group $(RESOURCE_GROUP) \
                  --name $(AKS_CLUSTER_NAME) \
                  --overwrite-existing

                APP_NAME="three-tier-app-${{ parameters.environment }}"
                ARGOCD_NS="argocd"
                MAX_WAIT=300
                INTERVAL=15
                ELAPSED=0

                echo "Waiting for ArgoCD to sync application '${APP_NAME}'..."

                while [[ ${ELAPSED} -lt ${MAX_WAIT} ]]; do
                  SYNC_STATUS=$(kubectl get application "${APP_NAME}" -n "${ARGOCD_NS}" \
                    -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
                  HEALTH_STATUS=$(kubectl get application "${APP_NAME}" -n "${ARGOCD_NS}" \
                    -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")

                  echo "  [${ELAPSED}s] Sync: ${SYNC_STATUS}, Health: ${HEALTH_STATUS}"

                  if [[ "${SYNC_STATUS}" == "Synced" && "${HEALTH_STATUS}" == "Healthy" ]]; then
                    echo ""
                    echo "ArgoCD sync complete! Application is healthy."
                    break
                  fi

                  sleep ${INTERVAL}
                  ELAPSED=$((ELAPSED + INTERVAL))
                done

                if [[ ${ELAPSED} -ge ${MAX_WAIT} ]]; then
                  echo "##vso[task.logissue type=warning]ArgoCD sync did not complete within ${MAX_WAIT}s."
                  echo "Current status: Sync=${SYNC_STATUS}, Health=${HEALTH_STATUS}"
                  echo "ArgoCD may still be syncing. Check the ArgoCD dashboard."
                fi

                echo ""
                echo "=== ArgoCD Application Details ==="
                kubectl get application "${APP_NAME}" -n "${ARGOCD_NS}" -o yaml 2>/dev/null | head -50 || true

                echo ""
                echo "=== App Pods ==="
                kubectl get pods -n three-tier-app -o wide 2>/dev/null || true

                echo ""
                echo "=== App Services ==="
                kubectl get svc -n three-tier-app 2>/dev/null || true
