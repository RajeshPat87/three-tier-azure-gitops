# ---------------------------------------------------------------------------
# PR Build Pipeline – validates pull requests before merge
# Runs: lint → unit tests → Docker build & Trivy scan → Terraform validate
# Stages and jobs run sequentially for predictable execution order.
# ---------------------------------------------------------------------------
trigger: none

pr:
  branches:
    include:
      - main
      - develop

variables:
  - name: DOCKER_BUILDKIT
    value: "1"

pool:
  vmImage: "ubuntu-latest"

stages:
  # ── Stage 1: Lint ─────────────────────────────────────────────────────
  - stage: Lint
    displayName: "Dockerfile Lint"
    jobs:
      - job: LintDockerfiles
        displayName: "Hadolint – Dockerfile Lint"
        steps:
          - script: |
              for i in 1 2 3; do
                curl -fsSL -o hadolint https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64 && break
                echo "Retry $i..." && sleep 5
              done
              chmod +x hadolint
            displayName: "Install hadolint"
            continueOnError: true

          - script: |
              if [ -x ./hadolint ]; then
                ./hadolint frontend/Dockerfile --failure-threshold warning
                ./hadolint backend/Dockerfile  --failure-threshold warning
              else
                echo "##[warning]hadolint not available, skipping Dockerfile lint"
              fi
            displayName: "Lint Dockerfiles"
            continueOnError: true

  # ── Stage 2: Unit Tests (runs after Lint) ─────────────────────────────
  - stage: UnitTests
    displayName: "Unit Tests"
    dependsOn: Lint
    jobs:
      - job: BackendTests
        displayName: "Backend – npm test"
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: "20.x"
            displayName: "Use Node 20"

          - script: |
              cd backend
              npm ci --ignore-scripts
              npm test --if-present
            displayName: "Install & test backend"

      - job: FrontendTests
        displayName: "Frontend – npm test"
        dependsOn: BackendTests
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: "20.x"
            displayName: "Use Node 20"

          - script: |
              cd frontend
              npm ci --ignore-scripts
              CI=true npm test --if-present
            displayName: "Install & test frontend"

  # ── Stage 3: Docker Build & Scan (runs after Unit Tests) ──────────────
  - stage: Build
    displayName: "Docker Build & Trivy Scan"
    dependsOn: UnitTests
    jobs:
      - job: BuildBackend
        displayName: "Build & scan backend image"
        steps:
          - script: |
              docker build -t three-tier-backend:pr-$(Build.BuildId) ./backend
            displayName: "Docker build backend"

          - script: |
              for i in 1 2 3; do
                curl -fsSL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.50.0 && break
                echo "Retry $i..." && sleep 5
              done
            displayName: "Install Trivy (backend)"
            continueOnError: true

          - script: |
              if command -v trivy &>/dev/null; then
                trivy image --exit-code 1 --severity HIGH,CRITICAL \
                  --no-progress three-tier-backend:pr-$(Build.BuildId)
              else
                echo "##[warning]Trivy not available, skipping backend image scan"
              fi
            displayName: "Trivy scan backend"
            continueOnError: true

      - job: BuildFrontend
        displayName: "Build & scan frontend image"
        dependsOn: BuildBackend
        steps:
          - script: |
              docker build -t three-tier-frontend:pr-$(Build.BuildId) ./frontend
            displayName: "Docker build frontend"

          - script: |
              for i in 1 2 3; do
                curl -fsSL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.50.0 && break
                echo "Retry $i..." && sleep 5
              done
            displayName: "Install Trivy (frontend)"
            continueOnError: true

          - script: |
              if command -v trivy &>/dev/null; then
                trivy image --exit-code 1 --severity HIGH,CRITICAL \
                  --no-progress three-tier-frontend:pr-$(Build.BuildId)
              else
                echo "##[warning]Trivy not available, skipping frontend image scan"
              fi
            displayName: "Trivy scan frontend"
            continueOnError: true

  # ── Stage 4: Terraform Validate (runs after Docker Build) ─────────────
  - stage: TerraformValidate
    displayName: "Terraform Validate"
    dependsOn: Build
    jobs:
      - job: TfValidate
        displayName: "terraform fmt & validate"
        steps:
          - script: |
              for i in 1 2 3; do
                curl -fsSL -o tf.zip https://releases.hashicorp.com/terraform/1.7.0/terraform_1.7.0_linux_amd64.zip && break
                echo "Retry $i..." && sleep 5
              done
              unzip -q tf.zip && sudo mv terraform /usr/local/bin/
            displayName: "Install Terraform"

          - script: |
              cd terraform
              terraform fmt -check -recursive
              terraform init -backend=false
              terraform validate
            displayName: "fmt + validate"
